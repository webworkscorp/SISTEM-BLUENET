<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema | BLUENET Trust & Escrow</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/6jZ2Epi.png" />
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return customFetch; },
            set: function(val) { customFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch with defineProperty:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
